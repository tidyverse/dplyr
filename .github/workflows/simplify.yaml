# Comment `/simplify` on an issue (team members only) to have Claude build,
# run, and post back a minimal reprex against the dev version of the package.
on:
  issue_comment:
    types: [created]

name: simplify.yaml

permissions: read-all

jobs:
  simplify:
    # Issues only (NOT PRs), team members only, body starts with /simplify
    if: ${{ !github.event.issue.pull_request && (github.event.comment.author_association == 'MEMBER' || github.event.comment.author_association == 'OWNER') && startsWith(github.event.comment.body, '/simplify') }}
    name: simplify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      # React first so the commenter immediately sees the command was picked up.
      - name: React to the command
        run: |
          gh api --method POST "/repos/$REPO/issues/comments/$COMMENT_ID/reactions" -f content='+1'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          COMMENT_ID: ${{ github.event.comment.id }}

      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # Installs reprex plus the dev version of the package (local::.) and its deps.
      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::reprex, local::.
          needs: simplify

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: |
            --model claude-sonnet-4-6
            --max-turns 40
            --allowedTools "Bash,Read,Write,Edit"
          prompt: |
            You are triaging GitHub issue #${{ github.event.issue.number }} in the
            ${{ github.repository }} repository. Your job is to reduce it to a minimal,
            reproducible example (a "reprex") and post that reprex back to the issue.

            ## Environment

            - This repo is an R package. Read its name from the `Package:` field of
              `DESCRIPTION`. This is the package referenced in the steps below.
            - The dev version of the package (the current state of this repo) is already
              installed and loadable with `library({package})`.
            - The `reprex` package is installed.
            - You have a Bash tool. Run R with `Rscript -e '...'` or `Rscript file.R`.
            - The `gh` CLI is authenticated (GH_TOKEN is set).
            - Confirm versions before you start:
              `Rscript -e 'cat(R.version.string); print(packageVersion("{package}"))'`

            ## Steps

            1. Read the full issue, including all comments:
               `gh issue view ${{ github.event.issue.number }} --comments`
               Identify the reported problem, the expected vs. actual behavior, any
               existing reprex, and any package/R versions mentioned.

            2. Build a MINIMAL reprex that reproduces the reported behavior:
               - Prefer built-in data (`mtcars`, `iris`) or a tiny inline
                 `data.frame`/`tibble` with the fewest rows and columns needed.
               - Use the fewest function calls possible and minimize dependencies
                 beyond the main package.
               - If the issue already contains a reprex, REDUCE it rather than
                 starting from scratch.

            3. Run and iterate. Write the candidate to a file and render it:
               `Rscript -e 'reprex::reprex(input = "repro.R", venue = "gh")'`
               Inspect the rendered output, then shrink further while confirming the
               reported behavior still appears. Stop when it is minimal or you are
               running low on turns.

            4. Rate your confidence (low / medium / high) that the final reprex
               faithfully reproduces the issue as reported, on the dev version of the
               package. Use "low" when the issue is vague, when no original reprex
               existed, or when you could not fully reproduce the behavior; "high" when
               you clearly reproduced the reported behavior. Be honest: say so
               explicitly if it did NOT reproduce.

            5. Post EXACTLY ONE new comment on the issue with this structure:
               - A short header noting this is an automated `/simplify` result.
               - The minimal reprex code in an ```r fenced block.
               - The rendered reprex output (the `venue = "gh"` markdown).
               - The package dev version and R version you used.
               - A line "**Confidence: low/medium/high**" followed by 1-3 bullets of
                 assumptions, caveats, or what could not be reproduced.
               - Whether it reproduced on the dev version (yes / no / partially).

            Always post a comment, even when confidence is low. Keep it self-contained
            and clearly labeled as automated.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
